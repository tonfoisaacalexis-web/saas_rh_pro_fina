name: Compilation APK SaaS RH

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Synchroniser les paquets
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Fabriquer l'APK Smartphone
        run: flutter build apk --debug

      - name: Mettre a disposition le fichier APK
        uses: actions/upload-artifact@v4
        with:
          name: Application_SaaS_RH_Smartphone
          path: build/app/outputs/flutter-apk/app-debug.apk
